<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        @page { size: A4; margin: 2cm; }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; color: #333; line-height: 1.4; }
        h1 { font-size: 24px; margin-bottom: 5px; color: #2c3e50; border-bottom: 2px solid #3498db; }
        h2 { font-size: 16px; margin-top: 15px; margin-bottom: 5px; color: #2980b9; }
        .contact-info { font-size: 12px; margin-bottom: 20px; color: #7f8c8d; }
        .section-content { font-size: 12px; margin-bottom: 10px; }
        ul { margin-top: 5px; padding-left: 20px; }
        li { margin-bottom: 4px; }
    </style>
</head>
<body>
    <h1>{{ name }}</h1>
    <div class="contact-info">
        {{ email }} | {{ phone }} | AWS Certified Solutions Architect | Portfolio: {{ portfolio_url }}
    </div>

    <h2>Professional Summary</h2>
    <div class="section-content">{{ summary }}</div>

    <h2>Core Competencies</h2>
    <div class="section-content">{{ skills }}</div>

    <h2>Experience & Projects</h2>
    <div class="section-content">
        {{ experience_html | safe }} 
    </div>
</body>
</html>
